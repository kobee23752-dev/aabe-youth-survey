    /* ===== 無印良品風格配色 ===== */
    :root {
      --bg-primary: #FAF9F7;      /* 溫暖米白 */
      --bg-secondary: #F5F3EF;    /* 淺米色 */
      --bg-card: #FFFFFF;         /* 純白卡片 */
      --text-primary: #2D2D2D;    /* 深灰文字 */
      --text-secondary: #6B6B6B;  /* 次要文字 */
      --text-muted: #999999;      /* 淡灰文字 */
      --accent: #8B7355;          /* 木質棕 */
      --accent-light: #C4B098;    /* 淡棕 */
      --border: #E8E4DE;          /* 邊框色 */
      --shadow: rgba(0,0,0,0.04); /* 極淡陰影 */
      
      /* 議題分類色 - 低飽和度自然色 */
      --cat-safety: #7BA3A8;      /* 青灰 - 安全 */
      --cat-health: #9B8AA6;      /* 淡紫 - 健康 */
      --cat-education: #A8B07A;   /* 橄欖綠 - 教育 */
      --cat-digital: #8899AA;     /* 藍灰 - 數位 */
      --cat-society: #C4A87C;     /* 沙棕 - 社會 */
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.8;
      font-weight: 300;
    }
    
    /* ===== Header ===== */
    header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 24px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 2px;
    }
    
    .logo span {
      color: var(--accent);
    }
    
    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      margin-left: 32px;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    
    nav a:hover {
      color: var(--accent);
    }
    
    /* ===== Hero ===== */
    .hero {
      background: var(--bg-card);
      padding: 80px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    
    .hero-label {
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    
    .hero h1 {
      font-size: 32px;
      font-weight: 300;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }
    
    .hero-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 48px;
      margin-top: 40px;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-number {
      font-size: 36px;
      font-weight: 500;
      color: var(--accent);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 1px;
    }
    
    /* ===== Main Content ===== */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    
    .section-title {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 3px;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    
    /* ===== Issue Cards Grid ===== */
    .issues-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }
    
    .issue-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .issue-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--shadow);
    }
    
    .issue-rank {
      position: absolute;
      top: 24px;
      right: 24px;
      font-size: 48px;
      font-weight: 100;
      color: var(--border);
      line-height: 1;
    }
    
    .issue-category {
      display: inline-block;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    
    .issue-card h3 {
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 12px;
      line-height: 1.5;
      padding-right: 48px;
    }
    
    .issue-excerpt {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 20px;
    }
    
    .issue-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    
    .issue-score {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .issue-score span {
      color: var(--accent);
      font-weight: 500;
    }
    
    .read-more {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 1px;
    }
    
    /* Category Colors */
    .cat-safety { background: var(--cat-safety); color: white; }
    .cat-health { background: var(--cat-health); color: white; }
    .cat-education { background: var(--cat-education); color: white; }
    .cat-digital { background: var(--cat-digital); color: white; }
    .cat-society { background: var(--cat-society); color: white; }
    
    /* ===== Detail Modal ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 1000;
      overflow-y: auto;
    }
    
    .modal-overlay.active {
      display: block;
    }
    
    .modal {
      background: var(--bg-card);
      max-width: 800px;
      margin: 40px auto;
      border-radius: 4px;
      position: relative;
    }
    
    .modal-header {
      padding: 40px 48px;
      border-bottom: 1px solid var(--border);
    }
    
    .modal-close {
      position: absolute;
      top: 24px;
      right: 24px;
      background: none;
      border: none;
      font-size: 24px;
      color: var(--text-muted);
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-close:hover {
      color: var(--text-primary);
    }
    
    .modal-rank {
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    
    .modal-title {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 16px;
    }
    
    .modal-body {
      padding: 40px 48px;
    }
    
    .modal-section {
      margin-bottom: 40px;
    }
    
    .modal-section h4 {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    
    .modal-section p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    
    .modal-section ul {
      list-style: none;
      padding: 0;
    }
    
    .modal-section li {
      font-size: 14px;
      color: var(--text-secondary);
      padding: 8px 0;
      padding-left: 20px;
      position: relative;
    }
    
    .modal-section li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 16px;
      width: 6px;
      height: 1px;
      background: var(--accent);
    }
    
    .data-highlight {
      background: var(--bg-secondary);
      padding: 24px;
      border-radius: 4px;
      margin: 16px 0;
    }
    
    .data-highlight .number {
      font-size: 32px;
      font-weight: 500;
      color: var(--accent);
    }
    
    .data-highlight .label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    .demands-list {
      background: var(--bg-secondary);
      padding: 24px;
      border-radius: 4px;
    }
    
    .demands-list h5 {
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    
    .modal-footer {
      padding: 24px 48px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .download-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 13px;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    
    .download-btn:hover {
      background: var(--text-primary);
    }
    
    /* ===== Footer ===== */
    footer {
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      padding: 48px 24px;
      text-align: center;
    }
    
    .footer-logo {
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    
    .footer-links {
      margin-bottom: 24px;
    }
    
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      margin: 0 16px;
      letter-spacing: 1px;
    }
    
    .footer-links a:hover {
      color: var(--accent);
    }
    
    .copyright {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    
    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .header-inner {
        flex-direction: column;
        gap: 16px;
      }
      
      nav a {
        margin: 0 12px;
      }
      
      .hero h1 {
        font-size: 24px;
      }
      
      .hero-stats {
        flex-wrap: wrap;
        gap: 24px;
      }
      
      .issues-grid {
        grid-template-columns: 1fr;
      }
      
      .modal {
        margin: 0;
        border-radius: 0;
        min-height: 100vh;
      }
      
      .modal-header,
      .modal-body,
      .modal-footer {
        padding-left: 24px;
        padding-right: 24px;
      }
    }
  </style>
</head>

          "支持青年參與國際氣候會議"
        ],
        pressDate: null
      },
      {
        rank: 10,
        title: "加強對青少年性健康的教育，包含避孕、性病防治等知識",
        shortTitle: "青少年性健康教育",
        category: "健康安全",
        catClass: "cat-health",
        score: 4.08,
        excerpt: "15-19歲女性梅毒感染10年暴增53倍，青少年淋病12年增7倍。花蓮縣未成年懷孕率是台北市的11倍。",
        keyData: "53倍",
        keyDataLabel: "15-19歲女性梅毒感染10年增幅",
        demands: [
          "增加性健康教育時數（國中每學期至少8節）",
          "更新教材納入完整避孕、性病防治知識",
          "擴大HPV疫苗至男性青少年"
        ],
        pressDate: null
      }
    ];
    
    // ===== 渲染卡片 =====
    function renderCards() {
      var grid = document.getElementById('issuesGrid');
      var html = '';
      
      for (var i = 0; i < issues.length; i++) {
        var issue = issues[i];
        html += '<div class="issue-card" onclick="openModal(' + i + ')">';
        html += '<div class="issue-rank">' + issue.rank + '</div>';
        html += '<span class="issue-category ' + issue.catClass + '">' + issue.category + '</span>';
        html += '<h3>' + issue.shortTitle + '</h3>';
        html += '<p class="issue-excerpt">' + issue.excerpt + '</p>';
        html += '<div class="issue-meta">';
        html += '<span class="issue-score">關注度 <span>' + issue.score.toFixed(2) + '</span></span>';
        html += '<span class="read-more">了解更多 →</span>';
        html += '</div>';
        html += '</div>';
      }
      
      grid.innerHTML = html;
    }
    
    // ===== Modal 功能 =====
    function openModal(index) {
      var issue = issues[index];
      var overlay = document.getElementById('modalOverlay');
      
      document.getElementById('modalRank').textContent = '第 ' + issue.rank + ' 名';
      document.getElementById('modalTitle').textContent = issue.title;
      document.getElementById('modalCategory').textContent = issue.category;
      document.getElementById('modalCategory').className = 'issue-category ' + issue.catClass;
      
      var bodyHtml = '';
      
      // 關鍵數據
      bodyHtml += '<div class="modal-section">';
      bodyHtml += '<h4>關鍵數據</h4>';
      bodyHtml += '<div class="data-highlight">';
      bodyHtml += '<div class="number">' + issue.keyData + '</div>';
      bodyHtml += '<div class="label">' + issue.keyDataLabel + '</div>';
      bodyHtml += '</div>';
      bodyHtml += '</div>';
      
      // 問題概述
      bodyHtml += '<div class="modal-section">';
      bodyHtml += '<h4>問題概述</h4>';
      bodyHtml += '<p>' + issue.excerpt + '</p>';
      bodyHtml += '</div>';
      
      // 政策訴求
      bodyHtml += '<div class="modal-section">';
      bodyHtml += '<h4>政策訴求</h4>';
      bodyHtml += '<div class="demands-list">';
      bodyHtml += '<h5>國教盟青年部主張</h5>';
      bodyHtml += '<ul>';
      for (var j = 0; j < issue.demands.length; j++) {
        bodyHtml += '<li>' + issue.demands[j] + '</li>';
      }
      bodyHtml += '</ul>';
      bodyHtml += '</div>';
      bodyHtml += '</div>';
      
      // 記者會資訊
      if (issue.pressDate) {
        bodyHtml += '<div class="modal-section">';
        bodyHtml += '<h4>相關倡議</h4>';
        bodyHtml += '<p>📅 記者會日期：' + issue.pressDate + '</p>';
        bodyHtml += '</div>';
      }
      
      document.getElementById('modalBody').innerHTML = bodyHtml;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }
    
    // 點擊背景關閉
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    
    // ESC 關閉
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
    
    // 初始化
    renderCards();
  </script>
</body>
</html>
